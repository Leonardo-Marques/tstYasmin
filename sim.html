<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#0a1a0f">
    <title>Sabia!</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            height: 100%;
            width: 100%;
            overflow: hidden;
            position: fixed;
            inset: 0;
        }

        body {
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #0a1a0f 0%, #1a3a2a 50%, #0d2818 100%);
            font-family: -apple-system, 'Segoe UI', system-ui, sans-serif;
            touch-action: none;
        }

        .confetti-container {
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 0;
        }

        .confetti {
            position: absolute;
            top: -10px;
            width: 10px;
            height: 10px;
            border-radius: 2px;
            animation: confettiFall linear forwards;
        }

        @keyframes confettiFall {
            0% { transform: translateY(-10vh) rotate(0deg); opacity: 1; }
            100% { transform: translateY(110vh) rotate(720deg); opacity: 0; }
        }

        .card {
            position: relative;
            z-index: 1;
            background: rgba(20, 45, 30, 0.85);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(80, 220, 130, 0.25);
            border-radius: 20px;
            padding: 28px 20px;
            text-align: center;
            box-shadow:
                0 0 80px rgba(50, 180, 100, 0.15),
                0 25px 50px rgba(0, 0, 0, 0.4);
            max-width: 360px;
            width: calc(100% - 32px);
            animation: cardIn 0.8s cubic-bezier(0.16, 1, 0.3, 1) both;
        }

        @media (min-width: 480px) {
            .card {
                padding: 56px 56px;
                max-width: 520px;
                border-radius: 24px;
            }
        }

        @keyframes cardIn {
            from { opacity: 0; transform: translateY(40px) scale(0.95); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        .celebration {
            font-size: 40px;
            margin-bottom: 12px;
            display: inline-block;
            animation: bounce 0.6s cubic-bezier(0.16, 1, 0.3, 1) both 0.3s;
        }

        @media (min-width: 480px) {
            .celebration { font-size: 56px; }
        }

        @keyframes bounce {
            0% { transform: scale(0); }
            50% { transform: scale(1.2); }
            100% { transform: scale(1); }
        }

        h1 {
            color: #34d399;
            font-size: 20px;
            font-weight: 700;
            margin-bottom: 8px;
            animation: fadeUp 0.6s ease both 0.5s;
        }

        @media (min-width: 480px) {
            h1 { font-size: 26px; }
        }

        .message {
            color: #e0fff0;
            font-size: 22px;
            font-weight: 600;
            line-height: 1.4;
            margin-top: 16px;
            animation: fadeUp 0.6s ease both 0.7s;
        }

        @media (min-width: 480px) {
            .message { font-size: 32px; margin-top: 24px; }
        }

        .highlight {
            color: #34d399;
            font-weight: 700;
        }

        .detail {
            color: rgba(180, 230, 200, 0.6);
            font-size: 13px;
            margin-top: 20px;
            animation: fadeUp 0.6s ease both 0.9s;
        }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .glow-ring {
            position: absolute;
            inset: -2px;
            border-radius: 26px;
            background: conic-gradient(from 0deg, transparent, rgba(52, 211, 153, 0.2), transparent, rgba(52, 211, 153, 0.15), transparent);
            animation: spin 5s linear infinite;
            z-index: -1;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .hearts {
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 0;
        }

        .floating-heart {
            position: absolute;
            font-size: 20px;
            animation: floatHeart linear infinite;
            opacity: 0.4;
        }

        @keyframes floatHeart {
            0% { transform: translateY(100vh) scale(0.5) rotate(0deg); opacity: 0; }
            10% { opacity: 0.5; }
            90% { opacity: 0.5; }
            100% { transform: translateY(-10vh) scale(1.2) rotate(20deg); opacity: 0; }
        }
    </style>
</head>
<body>
    <div class="confetti-container" id="confetti"></div>
    <div class="hearts" id="hearts"></div>

    <div class="card">
        <div class="glow-ring"></div>
        <div class="celebration">🥳</div>
        <h1>Eu sabia!</h1>
        <p class="message">
            Nos vemos amanha as <span class="highlight">20h</span><br>
            no <span class="highlight">Bar Spoiler</span>
        </p>
        <p class="detail">Mal posso esperar... 💚</p>
    </div>

    <script>
        const isMobile = window.innerWidth < 600;

        // Confetti (menos no mobile)
        const confettiContainer = document.getElementById('confetti');
        const greens = ['#34d399', '#10b981', '#059669', '#6ee7b7', '#a7f3d0', '#d1fae5', '#ffffff'];
        const confettiCount = isMobile ? 30 : 60;

        for (let i = 0; i < confettiCount; i++) {
            const c = document.createElement('div');
            c.className = 'confetti';
            c.style.left = Math.random() * 100 + '%';
            c.style.background = greens[Math.floor(Math.random() * greens.length)];
            c.style.animationDuration = (2 + Math.random() * 3) + 's';
            c.style.animationDelay = (Math.random() * 2) + 's';
            c.style.width = (5 + Math.random() * 8) + 'px';
            c.style.height = (5 + Math.random() * 8) + 'px';
            c.style.borderRadius = Math.random() > 0.5 ? '50%' : '2px';
            confettiContainer.appendChild(c);
        }

        // Floating hearts
        const heartsContainer = document.getElementById('hearts');
        const heartEmojis = ['💚', '🤍', '✨'];
        const heartCount = isMobile ? 10 : 15;

        for (let i = 0; i < heartCount; i++) {
            const h = document.createElement('div');
            h.className = 'floating-heart';
            h.textContent = heartEmojis[Math.floor(Math.random() * heartEmojis.length)];
            h.style.left = Math.random() * 100 + '%';
            h.style.animationDuration = (5 + Math.random() * 5) + 's';
            h.style.animationDelay = (Math.random() * 4) + 's';
            h.style.fontSize = (14 + Math.random() * 16) + 'px';
            heartsContainer.appendChild(h);
        }
    </script>
</body>
</html>
